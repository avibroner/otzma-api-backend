<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עוצמה — דשבורד מסלקה פנסיונית</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --card2: #162032; --hover: #334155;
  --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
  --accent: #38bdf8; --accent2: #a78bfa; --accent3: #34d399; --accent4: #fb923c; --accent5: #f472b6;
  --danger: #ef4444; --success: #22c55e; --warning: #eab308;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header { text-align:center; padding:28px 24px 20px; background:linear-gradient(135deg,#1e293b,#0f172a); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header h1 { font-size:1.8rem; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.header p { color:var(--muted); font-size:0.9rem; }

.tab-bar { display:flex; justify-content:center; gap:0; background:var(--card2); border-bottom:1px solid var(--border); position:sticky; top:85px; z-index:99; }
.tab-link { padding:12px 32px; color:var(--muted); text-decoration:none; font-size:0.95rem; border-bottom:3px solid transparent; transition:all .2s; }
.tab-link:hover { color:var(--text); background:var(--hover); }
.tab-link.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
.selector-bar { display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 24px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:130px; z-index:98; flex-wrap:wrap; }
.selector-bar label { color:var(--muted); font-size:0.95rem; }
.selector-bar select { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:1rem; font-family:inherit; cursor:pointer; min-width:260px; }
.selector-bar select:focus { outline:none; border-color:var(--accent); }
.nav-btns { display:flex; gap:6px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--text); cursor:pointer; font-size:0.85rem; transition:all .2s; }
.nav-btn:hover { border-color:var(--accent); background:var(--hover); }

.main { max-width:1400px; margin:0 auto; padding:24px; }

.kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.kpi .val { font-size:1.5rem; font-weight:700; }
.kpi .lbl { color:var(--muted); font-size:0.8rem; margin-top:2px; }

.section { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; }
.section-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; cursor:pointer; user-select:none; transition:background .2s; }
.section-head:hover { background:var(--hover); }
.section-head h3 { font-size:1.05rem; }
.section-head .toggle { color:var(--muted); font-size:0.8rem; transition:transform .3s; }
.section-head .toggle.open { transform:rotate(180deg); }
.section-body { display:none; padding:0 20px 16px; }
.section-body.open { display:block; }

/* Card */
.pcard { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:20px 24px; }
.pcard-title { font-size:1.05rem; font-weight:700; color:var(--accent); margin-bottom:4px; }
.pcard-subtitle { font-size:0.82rem; color:var(--muted); margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.pcard-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; font-size:0.88rem; gap:12px; }
.pcard-row .lbl { color:var(--muted); white-space:nowrap; }
.pcard-row .val { font-weight:600; text-align:left; direction:ltr; }
.pcard-row .val.money { font-family:'Courier New',monospace; color:var(--accent3); }
.pcard-row .val.fee { color:var(--warning); font-weight:700; }
.pcard-divider { border:none; border-top:1px solid var(--border); margin:10px 0; }
.pcard-section-label { font-size:0.82rem; font-weight:700; color:var(--accent2); margin:8px 0 4px; }
.pcard-track { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:0.84rem; }
.pcard-track .tn { color:var(--text); }
.pcard-track .tv { font-family:'Courier New',monospace; color:var(--accent3); font-weight:600; direction:ltr; text-align:left; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; margin-bottom:16px; }

/* Policy accordion */
.pol-acc { background:var(--bg); border:1px solid var(--border); border-radius:10px; margin-bottom:12px; overflow:hidden; }
.pol-acc-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; gap:12px; }
.pol-acc-head:hover { background:var(--card2); }
.pol-acc-head .ph-name { font-weight:600; font-size:0.95rem; }
.pol-acc-head .ph-meta { color:var(--muted); font-size:0.82rem; }
.pol-acc-head .ph-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.pol-acc-head .ph-amount { color:var(--accent3); font-weight:700; font-family:'Courier New',monospace; }
.pol-acc-body { display:none; padding:16px; }
.pol-acc-body.open { display:block; }

/* Tables */
.sub-section { margin-top:14px; }
.sub-title { font-size:0.9rem; color:var(--accent); margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.dtable { width:100%; border-collapse:collapse; font-size:0.8rem; margin-top:6px; }
.dtable thead th { background:var(--card); color:var(--accent); padding:7px 8px; text-align:right; white-space:nowrap; border-bottom:2px solid var(--border); position:sticky; top:0; }
.dtable tbody td { padding:5px 8px; border-bottom:1px solid var(--border); white-space:nowrap; }
.dtable tbody tr:hover { background:var(--hover); }
.amount { font-family:'Courier New',monospace; }

.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:600; vertical-align:middle; }
.b-active { background:#16a34a33; color:#4ade80; }
.b-inactive { background:#dc262633; color:#f87171; }
.b-na { background:#eab30833; color:#facc15; }
.b-yes { background:#dc262633; color:#f87171; }
.b-no { background:#16a34a22; color:#86efac; }

.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.chart-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
.chart-box h4 { color:var(--accent); margin-bottom:10px; font-size:0.95rem; }

.client-cards { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.cover-card { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-bottom:10px; }
.cover-card .cc-title { font-weight:700; color:var(--accent5); margin-bottom:10px; font-size:0.9rem; padding-bottom:8px; border-bottom:1px solid var(--border); }

.footer { text-align:center; padding:20px; color:var(--dim); font-size:0.8rem; border-top:1px solid var(--border); margin-top:24px; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--dim); border-radius:3px; }

@media(max-width:800px) { .charts-row,.cards-grid,.client-cards { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>עוצמה — דשבורד מסלקה פנסיונית</h1>
  <p>סקירה מלאה של נתוני המסלקה · נכון ל-28/02/2026</p>
</div>

<div class="tab-bar">
  <a href="dashboard.html" class="tab-link active">📄 תצוגת נתונים</a>
  <a href="analysis.html" class="tab-link">🔍 ניתוח והמלצות</a>
</div>

<div class="selector-bar">
  <div id="clientInfo" style="font-size:1.15rem;font-weight:600;color:var(--accent);"></div>
  <select id="clientSelect" style="display:none"></select>
</div>

<div class="main" id="main"></div>
<div class="footer">דשבורד מסלקה — עוצמה · נתונים נכונים ל-28/02/2026 · נוצר ב-29/03/2026</div>

<script>
let DATA = [];
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const recordId = params.get('id');
  const mainEl = document.getElementById('main');

  if (!recordId) {
    // No ID - show demo data if available via inline, or show message
    mainEl.innerHTML = '<div style="text-align:center;padding:80px 24px;color:var(--muted)"><h2 style="margin-bottom:12px;color:var(--accent)">עוצמה — דשבורד מסלקה</h2><p>יש לגשת דרך הלינק בפיירברי עם מזהה רשומה</p></div>';
    return;
  }

  // Show loading
  mainEl.innerHTML = '<div style="text-align:center;padding:80px 24px;color:var(--muted)"><p style="font-size:1.2rem">⏳ טוען נתונים...</p></div>';

  try {
    const res = await fetch(`/api/mislaka/data?id=${recordId}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || err.error || `שגיאה ${res.status}`);
    }
    const json = await res.json();
    if (json.expired) {
      mainEl.innerHTML = '<div style="text-align:center;padding:80px 24px"><h2 style="color:var(--warning);margin-bottom:12px">נתוני המסלקה אינם זמינים</h2><p style="color:var(--muted);font-size:1.05rem">יש להזמין מסלקה חדשה</p></div>';
      return;
    }
    DATA = Array.isArray(json) ? json : json.data ? (Array.isArray(json.data) ? json.data : [json.data]) : [json];
  } catch(e) {
    mainEl.innerHTML = `<div style="text-align:center;padding:80px 24px"><h2 style="color:var(--danger);margin-bottom:12px">שגיאה בטעינת הנתונים</h2><p style="color:var(--muted)">${e.message}</p></div>`;
    return;
  }

  if (!DATA.length) {
    mainEl.innerHTML = '<div style="text-align:center;padding:80px 24px"><h2 style="color:var(--warning);margin-bottom:12px">נתוני המסלקה אינם זמינים</h2><p style="color:var(--muted);font-size:1.05rem">יש להזמין מסלקה חדשה</p></div>';
    return;
  }

  // Clear loading, continue to render
  mainEl.innerHTML = '';
  initApp();
})();

function toggleSection(el){ el.nextElementSibling.classList.toggle('open'); el.querySelector('.toggle').classList.toggle('open'); }

function initApp() {

const COLORS = ['#38bdf8','#a78bfa','#34d399','#fb923c','#f472b6','#60a5fa','#c084fc','#2dd4bf','#fbbf24','#e879f9'];

// ─── Helpers ───
function n(v){ if(v===''||v===null||v===undefined||v==='לא נמצא')return 0; const x=parseFloat(String(v).replace(/,/g,'')); return isNaN(x)?0:x; }
function fc(v){ const x=n(v); if(x===0&&(v===''||v===null||v===undefined))return null; return '₪'+x.toLocaleString('he-IL'); }
function fp(v){ if(v===null||v===undefined||v==='')return null; return n(v).toFixed(2)+'%'; }
function f(v){ return (v===''||v===null||v===undefined)?null:String(v); }
function badge(s){ if(s==='פעיל')return '<span class="badge b-active">פעיל</span>'; if(s==='לא פעיל')return '<span class="badge b-inactive">לא פעיל</span>'; return '<span class="badge b-na">'+(s||'—')+'</span>'; }
function ynBadge(v){ return v==='כן'?'<span class="badge b-yes">כן</span>':'<span class="badge b-no">'+(v||'לא')+'</span>'; }
function toArr(v){ if(!v)return[]; if(Array.isArray(v))return v; if(typeof v==='object')return[v]; return[]; }

function isScalar(v){ return v===null||v===undefined||typeof v!=='object'; }

// Smart value formatting: detect money, percentages, yes/no
function smartVal(k, v){
  if(v===null||v===undefined||v==='') return null;
  const s = String(v);
  // Status
  if(k==='סטטוס') return badge(s);
  // Yes/No fields
  if(s==='כן'||s==='לא') {
    if(k.includes('עיקול')||k.includes('שיעבוד')) return ynBadge(s);
    return s;
  }
  // Money: numeric and key suggests money
  const moneyKeys = ['סך','יתרה','הפקדה','הפקדות','סכום','חיסכון','ללא פרמ','שכר','ערך','צבירה','פדיון','פיצויים','תגמולים','קצבה','מצטבר','ביטוח','עלות','פנסי'];
  const feeKeys = ['דמנה','דמי ניהול','שיעור דמ'];
  const isMoney = moneyKeys.some(mk=>k.includes(mk));
  const isFee = feeKeys.some(fk=>k.includes(fk));
  if(isFee && !isNaN(parseFloat(s))){
    return '<span class="val fee">'+n(v).toFixed(2)+'%</span>';
  }
  if(isMoney && !isNaN(parseFloat(s)) && n(v)!==0){
    return '<span class="val money">₪'+n(v).toLocaleString('he-IL')+'</span>';
  }
  return s;
}

// One row
function row(label, val, cls){
  if(val===null||val===undefined) return '';
  return `<div class="pcard-row"><span class="lbl">${label}</span><span class="val ${cls||''}">${val}</span></div>`;
}

// Render all scalar keys of an object as rows (dynamic!)
function renderObjRows(obj, exclude){
  if(!obj||typeof obj!=='object') return '';
  const ex = new Set(exclude||[]);
  let h = '';
  Object.keys(obj).forEach(k => {
    if(ex.has(k)) return;
    const v = obj[k];
    if(!isScalar(v)) return; // skip nested objects/arrays
    const sv = smartVal(k, v);
    if(sv===null) return;
    // Check if smartVal already wrapped in span
    if(sv.startsWith('<span')) h += `<div class="pcard-row"><span class="lbl">${k}</span>${sv}</div>`;
    else h += row(k, sv);
  });
  return h;
}

// Render a card from an object dynamically
function renderCard(title, subtitle, obj, exclude){
  if(!obj||typeof obj!=='object') return '';
  const rows = renderObjRows(obj, exclude);
  if(!rows) return '';
  return `<div class="pcard">
    <div class="pcard-title">${title}</div>
    ${subtitle?'<div class="pcard-subtitle">'+subtitle+'</div>':''}
    ${rows}
  </div>`;
}

// Render a table from array of objects dynamically
function renderTable(title, arr, maxHeight){
  if(!arr||!arr.length||typeof arr[0]!=='object') return '';
  const keys = [];
  // Collect all unique keys maintaining order
  arr.forEach(item => { Object.keys(item).forEach(k => { if(!keys.includes(k)&&isScalar(item[k])) keys.push(k); }); });
  if(!keys.length) return '';

  let h = `<div class="sub-section"><div class="sub-title">${title} (${arr.length})</div>
    <div style="overflow-x:auto;${maxHeight?'max-height:'+maxHeight+'px;overflow-y:auto':''}">
    <table class="dtable"><thead><tr>`;
  keys.forEach(k => { h += `<th>${k}</th>`; });
  h += `</tr></thead><tbody>`;
  arr.forEach(item => {
    h += '<tr>';
    keys.forEach(k => {
      const v = item[k];
      const sv = smartVal(k, v);
      h += `<td>${sv!==null?sv:'—'}</td>`;
    });
    h += '</tr>';
  });
  h += `</tbody></table></div></div>`;
  return h;
}

// ─── Persons ───
const persons = DATA.map((d,i) => {
  const pols = d.polisot||[];
  let name='', clientData=null;
  for(const p of pols){
    if(p['\u05dc\u05e7\u05d5\u05d7']&&typeof p['\u05dc\u05e7\u05d5\u05d7']==='object'){
      clientData = p['\u05dc\u05e7\u05d5\u05d7'];
      name = (clientData['\u05e9\u05dd \u05e4\u05e8\u05d8\u05d9']||'')+' '+(clientData['\u05e9\u05dd \u05de\u05e9\u05e4\u05d7\u05d4']||'');
      break;
    }
  }
  if(!name) for(const p of pols){ const g=p['נתוני גביה']||{}; if(g['שם משלם']){name=g['שם משלם'];break;} }
  let employers = [];
  pols.forEach(p => {
    const emp = p['מעסיקים'];
    if(emp){ const arr=Array.isArray(emp)?emp:[emp]; arr.forEach(e=>{ if(typeof e==='object'&&e['שם מעסיק']&&!employers.find(x=>x['שם מעסיק']===e['שם מעסיק'])) employers.push(e); }); }
  });
  return { id:d.person_id_number, name:name.trim()||d.person_id_number, polisot:pols, client:clientData, employers };
});

// ─── Selector ───
const sel = document.getElementById('clientSelect');
persons.forEach((p,i) => { const o=document.createElement('option'); o.value=i; o.textContent=`${p.name} (${p.id}) — ${p.polisot.length} פוליסות`; sel.appendChild(o); });
let currentIdx = 0;
// Display client name prominently
const clientInfoEl = document.getElementById('clientInfo');
if (persons.length === 1) {
  const p = persons[0];
  clientInfoEl.innerHTML = `${p.name} <span style="color:var(--muted);font-weight:400;font-size:0.9rem">(ת.ז. ${p.id}) · ${p.polisot.length} פוליסות</span>`;
} else {
  clientInfoEl.innerHTML = persons.map(p => `${p.name} <span style="color:var(--muted);font-weight:400;font-size:0.9rem">(${p.id})</span>`).join(' · ');
}

// ─── Main Render ───
let charts = [];
function render(){
  charts.forEach(c=>c.destroy()); charts=[];
  const P = persons[currentIdx];
  const main = document.getElementById('main');
  const totalSav = P.polisot.reduce((s,p)=>s+n(p['סך חיסכון']),0);
  const totalFut = P.polisot.reduce((s,p)=>s+n(p['סה״כ יתרה עתידית']),0);
  const activeC = P.polisot.filter(p=>p['סטטוס']==='פעיל').length;

  let h = '';

  // KPIs
  h += `<div class="kpi-strip">
    <div class="kpi"><div class="val" style="color:var(--accent)">${P.polisot.length}</div><div class="lbl">פוליסות</div></div>
    <div class="kpi"><div class="val" style="color:var(--success)">${activeC}</div><div class="lbl">פעילות</div></div>
    <div class="kpi"><div class="val" style="color:var(--danger)">${P.polisot.length-activeC}</div><div class="lbl">לא פעילות</div></div>
    <div class="kpi"><div class="val amount" style="color:var(--accent3)">₪${totalSav.toLocaleString('he-IL')}</div><div class="lbl">סך חיסכון</div></div>
    <div class="kpi"><div class="val amount" style="color:var(--accent4)">₪${totalFut.toLocaleString('he-IL')}</div><div class="lbl">יתרה עתידית</div></div>
    <div class="kpi"><div class="val" style="color:var(--danger)">${P.polisot.filter(p=>p['עיקול']==='כן').length}</div><div class="lbl">עיקולים</div></div>
  </div>`;

  // Charts
  h += `<div class="charts-row">
    <div class="chart-box"><h4>חיסכון לפי פוליסה</h4><canvas id="ch1"></canvas></div>
    <div class="chart-box"><h4>התפלגות סוג מוצר</h4><canvas id="ch2"></canvas></div>
  </div>`;

  // Client info
  h += buildClientSection(P);

  // Policy summary cards
  h += `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>📋 פוליסות — תצוגת כרטיסים (${P.polisot.length})</h3><span class="toggle open">▼</span>
  </div><div class="section-body open"><div class="cards-grid">`;
  P.polisot.forEach(pol => { h += buildPolicySummaryCard(pol); });
  h += `</div></div></div>`;

  // Detailed per-policy
  h += `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>📊 נתונים מפורטים לפי פוליסה</h3><span class="toggle">▼</span>
  </div><div class="section-body">`;
  P.polisot.forEach((pol,pi) => { h += buildPolicyDetail(pol, pi); });
  h += `</div></div>`;

  main.innerHTML = h;
  buildCharts(P);
}

// ─── Client Section (dynamic) ───
function buildClientSection(P){
  const c = P.client;
  if(!c) return '';

  let h = `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>👤 פרטי לקוח</h3><span class="toggle open">▼</span>
  </div><div class="section-body open"><div class="client-cards">`;

  // All client fields dynamically
  h += `<div class="pcard">
    <div class="pcard-title">👤 פרטים אישיים</div>
    <div class="pcard-subtitle">${f(c['שם פרטי'])||''} ${f(c['שם משפחה'])||''} · ת.ז ${P.id}</div>
    ${renderObjRows(c)}
  </div>`;

  h += `</div>`;

  // Employers (dynamic)
  if(P.employers.length){
    h += `<div style="margin-top:14px"><div class="sub-title">🏢 מעסיקים (${P.employers.length})</div>
    <div class="cards-grid" style="margin-top:10px">`;
    P.employers.forEach(e => {
      h += `<div class="pcard">
        <div class="pcard-title">${f(e['שם מעסיק'])||'—'}</div>
        <div class="pcard-subtitle">מעסיק</div>
        ${renderObjRows(e)}
      </div>`;
    });
    h += `</div></div>`;
  }

  h += `</div></div>`;
  return h;
}

// ─── Policy Summary Card ───
function buildPolicySummaryCard(pol){
  const producer = typeof pol['יצרן']==='object' ? (pol['יצרן']['שם יצרן']||null) : (pol['יצרן']||null);
  const tracks = toArr(pol['פירוט מסלולי השקעה']);

  // Show key summary fields
  let h = `<div class="pcard">
    <div class="pcard-title">${f(pol['שם תוכנית'])||'—'}</div>
    <div class="pcard-subtitle">${badge(pol['סטטוס'])} ${producer?'<span>'+producer+'</span>':''}</div>
    ${row('סוג מוצר',f(pol['סוג מוצר']))}
    ${row('סוג חשבון',f(pol['סוג חשבון']))}
    ${row('סך חיסכון',fc(pol['סך חיסכון']),'money')}
    ${row('יתרה עתידית',fc(pol['סה״כ יתרה עתידית']),'money')}
    ${row('הפקדה אחרונה',fc(pol['הפקדה אחרונה סה״כ']),'money')}
    ${row('דמ"נ צבירה',fp(pol['דמנה״ל צבירה']),'fee')}
    ${row('דמ"נ הפקדה',fp(pol['דמנה״ל הפקדה']),'fee')}
    ${row('הצטרפות',f(pol['ת. הצטרפות']))}
    ${row('עיקול',ynBadge(pol['עיקול']))}`;

  if(tracks.length && typeof tracks[0]==='object'){
    h += `<hr class="pcard-divider"><div class="pcard-section-label">מסלולי השקעה:</div>`;
    tracks.forEach(t => {
      h += `<div class="pcard-track"><span class="tn">${f(t['שם מסלול'])||'—'}</span><span class="tv">${fc(t['סכום צבירה במסלול'])||'—'}</span></div>`;
    });
  }
  h += `</div>`;
  return h;
}

// ─── Policy Detail (all data, dynamic) ───
function buildPolicyDetail(pol, idx){
  const producer = typeof pol['יצרן']==='object' ? (pol['יצרן']['שם יצרן']||null) : (pol['יצרן']||null);

  // Keys that are nested objects/arrays (handled separately)
  const nestedKeys = new Set([
    'פירוט מסלולי השקעה','פרטי עובד','נתוני גביה','פירוט הפרשות לפוליסה',
    'פירוט הפקדות אחרונות','פירוט מבנה דמי ניהול','פירוט יתרות סוף שנה',
    'הפקדות שנתיות','יתרות','יתרות לגיל פרישה','כיסויים',
    'רשימת מוטבים עפ\u05F4י כיסוי','רשימת מוטבים עפ"י כיסוי',
    'פירוט מיופי כח','משיכה / ניוד','מעסיקים','לקוח','יצרן'
  ]);

  let h = `<div class="pol-acc"><div class="pol-acc-head" onclick="this.nextElementSibling.classList.toggle('open')">
    <div><span class="ph-name">${f(pol['שם תוכנית'])||'—'}</span>
    <span class="ph-meta"> · ${f(pol['סוג מוצר'])||''}</span></div>
    <div class="ph-right">${badge(pol['סטטוס'])}
    <span class="ph-amount">${fc(pol['סך חיסכון'])||'—'}</span>
    <span style="color:var(--muted);font-size:0.8rem">▼</span></div>
  </div><div class="pol-acc-body">`;

  // ── Cards grid ──
  h += `<div class="cards-grid">`;

  // Card 1: All scalar policy fields (dynamic)
  h += `<div class="pcard">
    <div class="pcard-title">📌 פרטי פוליסה</div>
    <div class="pcard-subtitle">כל השדות הסקלריים</div>`;
  // Producer as first row if exists
  if(producer) h += row('יצרן', producer);
  h += renderObjRows(pol, [...nestedKeys]);
  h += `</div>`;

  // Card 2: פרטי עובד (dynamic)
  const emp = pol['פרטי עובד'];
  if(emp && typeof emp==='object'){
    h += renderCard('👷 פרטי עובד', 'תעסוקה', emp);
  }

  // Card 3: נתוני גביה (dynamic)
  const gv = pol['נתוני גביה'];
  if(gv && typeof gv==='object'){
    h += renderCard('🏦 נתוני גביה', 'תשלומים', gv);
  }

  // Card 4: יתרות לגיל פרישה (dynamic)
  let retire = pol['יתרות לגיל פרישה'];
  if(retire && typeof retire==='object' && !Array.isArray(retire)){
    h += renderCard('🎯 יתרות לגיל פרישה', 'תחזיות', retire);
  } else if(Array.isArray(retire) && retire.length && typeof retire[0]==='object'){
    // Render each as separate card
    retire.forEach((r,ri) => { h += renderCard('🎯 יתרות לגיל פרישה'+(retire.length>1?' ('+(ri+1)+')':''), 'תחזיות', r); });
  }

  // Card 5: הפקדות שנתיות (dynamic) - can be dict
  let annDeps = pol['הפקדות שנתיות'];
  if(annDeps && typeof annDeps==='object' && !Array.isArray(annDeps)){
    h += renderCard('📅 הפקדות שנתיות', '', annDeps);
  }

  // Card 6: מיופי כח (dynamic)
  const poa = pol['פירוט מיופי כח'];
  if(poa && typeof poa==='object'){
    const poaRows = renderObjRows(poa);
    if(poaRows) h += `<div class="pcard"><div class="pcard-title">📝 מיופה כח</div><div class="pcard-subtitle">הרשאות</div>${poaRows}</div>`;
  }

  // Card 7: משיכה / ניוד (dynamic)
  const withdraw = pol['משיכה / ניוד'];
  if(withdraw && typeof withdraw==='object'){
    const wArr = Array.isArray(withdraw)?withdraw:[withdraw];
    wArr.forEach(w => {
      if(typeof w==='object'){
        const wr = renderObjRows(w);
        if(wr) h += `<div class="pcard"><div class="pcard-title">🔄 משיכה / ניוד</div><div class="pcard-subtitle">פרטים</div>${wr}</div>`;
      }
    });
  }

  h += `</div>`; // close cards-grid

  // ── Tables (dynamic) ──

  // מסלולי השקעה
  h += renderTable('📊 מסלולי השקעה', toArr(pol['פירוט מסלולי השקעה']));

  // הפרשות
  h += renderTable('📥 הפרשות לפוליסה', toArr(pol['פירוט הפרשות לפוליסה']));

  // הפקדות אחרונות
  h += renderTable('📋 הפקדות אחרונות', toArr(pol['פירוט הפקדות אחרונות']), 300);

  // דמי ניהול
  h += renderTable('💳 מבנה דמי ניהול', toArr(pol['פירוט מבנה דמי ניהול']));

  // יתרות סוף שנה
  h += renderTable('📆 יתרות סוף שנה', toArr(pol['פירוט יתרות סוף שנה']));

  // הפקדות שנתיות (if array)
  if(Array.isArray(annDeps) && annDeps.length && typeof annDeps[0]==='object'){
    h += renderTable('📅 הפקדות שנתיות', annDeps);
  }

  // יתרות
  const balances = toArr(pol['יתרות']);
  if(balances.length){
    h += `<div class="sub-section"><div class="sub-title">🏛️ יתרות</div>`;
    balances.forEach(bal => {
      if(typeof bal!=='object') return;
      // פירוט יתרות
      h += renderTable('פירוט יתרות', toArr(bal['פירוט יתרות']));
      // פירוט יתרה לתקופה
      h += renderTable('יתרה לתקופה', toArr(bal['פירוט יתרה לתקופה']));
      // יתרות שונות
      const misc = bal['יתרות שונות'];
      if(misc && typeof misc==='object'){
        const mr = renderObjRows(misc);
        if(mr) h += `<div class="pcard" style="margin:10px 0"><div class="pcard-section-label">יתרות שונות</div>${mr}</div>`;
      }
    });
    h += `</div>`;
  }

  // כיסויים
  const covers = toArr(pol['כיסויים']);
  if(covers.length && typeof covers[0]==='object'){
    h += `<div class="sub-section"><div class="sub-title">🛡️ כיסויים ביטוחיים (${covers.length})</div>`;
    covers.forEach(cov => {
      if(typeof cov!=='object') return;
      const covNestedKeys = new Set(['ביטוח יסודי','פרטי כיסוי','כיסוי בקרן פנסיה','סכום ביטוח יסודי','פרטי מבוטח','מוטבים','תוספות','תחביבים / עיסוקים']);

      h += `<div class="cover-card">
        <div class="cc-title">${f(cov['שם כיסוי אצל היצרן'])||'—'} · ${f(cov['סוג כיסוי אצל יצרן'])||''}</div>`;

      // Top-level cover scalar fields
      h += renderObjRows(cov, [...covNestedKeys]);

      // Each nested section dynamically
      const subSections = [
        ['ביטוח יסודי','ביטוח יסודי'],
        ['פרטי כיסוי','פרטי כיסוי'],
        ['כיסוי בקרן פנסיה','כיסוי בקרן פנסיה'],
        ['סכום ביטוח יסודי','סכום ביטוח יסודי'],
        ['פרטי מבוטח','פרטי מבוטח'],
        ['תוספות','תוספות'],
        ['תחביבים / עיסוקים','תחביבים / עיסוקים']
      ];
      subSections.forEach(([key, label]) => {
        const sub = cov[key];
        if(sub && typeof sub==='object' && !Array.isArray(sub)){
          const sr = renderObjRows(sub);
          if(sr) h += `<hr class="pcard-divider"><div class="pcard-section-label">${label}</div>${sr}`;
        }
      });

      // מוטבים (table)
      const bens = toArr(cov['מוטבים']);
      if(bens.length && typeof bens[0]==='object'){
        h += `<hr class="pcard-divider">`;
        h += renderTable('מוטבים', bens);
      }

      h += `</div>`; // close cover-card
    });
    h += `</div>`;
  }

  // רשימת מוטבים עפ״י כיסוי - try both quote variants
  let benList = pol['רשימת מוטבים עפ\u05F4י כיסוי'] || pol['רשימת מוטבים עפ"י כיסוי'];
  const benArr = toArr(benList);
  if(benArr.length && typeof benArr[0]==='object'){
    h += renderTable('👥 רשימת מוטבים עפ״י כיסוי', benArr);
  }

  h += `</div></div>`; // close pol-acc-body, pol-acc
  return h;
}

// ─── Charts ───
function buildCharts(P){
  const polsWithSav = P.polisot.filter(p=>n(p['סך חיסכון'])>0);
  if(polsWithSav.length){
    charts.push(new Chart(document.getElementById('ch1'),{
      type:'bar', data:{
        labels:polsWithSav.map(p=>(p['שם תוכנית']||'?').substring(0,25)),
        datasets:[
          {label:'סך חיסכון',data:polsWithSav.map(p=>n(p['סך חיסכון'])),backgroundColor:'#38bdf8'},
          {label:'יתרה עתידית',data:polsWithSav.map(p=>n(p['סה״כ יתרה עתידית'])),backgroundColor:'#a78bfa'}
        ]
      }, options:{responsive:true,indexAxis:'y',
        scales:{x:{ticks:{color:'#94a3b8',callback:v=>'₪'+(v/1000).toFixed(0)+'K'},grid:{color:'#1e293b'}},y:{ticks:{color:'#e2e8f0',font:{size:11}},grid:{display:false}}},
        plugins:{legend:{labels:{color:'#e2e8f0'}}}}
    }));
  }
  const types={}; P.polisot.forEach(p=>{const t=p['סוג מוצר']||'אחר';types[t]=(types[t]||0)+1;});
  charts.push(new Chart(document.getElementById('ch2'),{
    type:'doughnut', data:{labels:Object.keys(types),datasets:[{data:Object.values(types),backgroundColor:COLORS}]},
    options:{responsive:true,cutout:'50%',plugins:{legend:{labels:{color:'#e2e8f0'}}}}
  }));
}

render();
}
// Preserve ?id= in tab links
(function(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(id) document.querySelectorAll('.tab-link').forEach(a => {
    const url = new URL(a.href, location.href);
    url.searchParams.set('id', id);
    a.href = url.toString();
  });
})();
