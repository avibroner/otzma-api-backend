<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עוצמה — ניתוח והמלצות</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --card2: #162032; --hover: #334155;
  --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
  --accent: #38bdf8; --accent2: #a78bfa; --accent3: #34d399; --accent4: #fb923c; --accent5: #f472b6;
  --danger: #ef4444; --success: #22c55e; --warning: #eab308;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header { text-align:center; padding:28px 24px 20px; background:linear-gradient(135deg,#1e293b,#0f172a); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header h1 { font-size:1.8rem; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.header p { color:var(--muted); font-size:0.9rem; }

/* Tab bar */
.tab-bar { display:flex; justify-content:center; gap:0; background:var(--card2); border-bottom:1px solid var(--border); position:sticky; top:85px; z-index:99; }
.tab-link { padding:12px 32px; color:var(--muted); text-decoration:none; font-size:0.95rem; border-bottom:3px solid transparent; transition:all .2s; }
.tab-link:hover { color:var(--text); background:var(--hover); }
.tab-link.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

.selector-bar { display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 24px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:130px; z-index:98; flex-wrap:wrap; }
.selector-bar label { color:var(--muted); font-size:0.95rem; }
.selector-bar select { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:1rem; font-family:inherit; cursor:pointer; min-width:260px; }
.selector-bar select:focus { outline:none; border-color:var(--accent); }
.nav-btns { display:flex; gap:6px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--text); cursor:pointer; font-size:0.85rem; transition:all .2s; }
.nav-btn:hover { border-color:var(--accent); background:var(--hover); }

.main { max-width:1400px; margin:0 auto; padding:24px; }

/* KPI */
.kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.kpi .val { font-size:1.6rem; font-weight:700; }
.kpi .lbl { color:var(--muted); font-size:0.8rem; margin-top:2px; }
.amount { font-family:'Courier New',monospace; }

/* Section */
.section { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
.section-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; user-select:none; transition:background .2s; }
.section-head:hover { background:var(--hover); }
.section-head h3 { font-size:1.1rem; }
.section-head .cnt { background:var(--accent); color:var(--bg); padding:2px 10px; border-radius:12px; font-size:0.8rem; font-weight:700; }
.section-head .toggle { color:var(--muted); font-size:0.8rem; transition:transform .3s; }
.section-head .toggle.open { transform:rotate(180deg); }
.section-body { display:none; padding:0 20px 20px; }
.section-body.open { display:block; }

/* Alert cards */
.alerts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:12px; }
.alert-card { border-radius:10px; padding:16px 20px; border-right:5px solid; }
.alert-card.critical { background:#7f1d1d33; border-right-color:var(--danger); }
.alert-card.warning { background:#78350f33; border-right-color:var(--warning); }
.alert-card.ok { background:#14532d33; border-right-color:var(--success); }
.alert-card .a-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.alert-card .a-icon { font-size:1.3rem; }
.alert-card .a-title { font-weight:700; font-size:0.95rem; }
.alert-card.critical .a-title { color:var(--danger); }
.alert-card.warning .a-title { color:var(--warning); }
.alert-card.ok .a-title { color:var(--success); }
.alert-card .a-detail { font-size:0.85rem; color:var(--text); line-height:1.6; }
.alert-card .a-amount { font-family:'Courier New',monospace; font-weight:700; color:var(--accent3); }
.alert-card .a-policy { color:var(--muted); font-size:0.8rem; margin-top:4px; }

/* Tables */
.dtable { width:100%; border-collapse:collapse; font-size:0.85rem; }
.dtable thead th { background:var(--bg); color:var(--accent); padding:10px 12px; text-align:right; white-space:nowrap; border-bottom:2px solid var(--border); }
.dtable tbody td { padding:8px 12px; border-bottom:1px solid var(--border); }
.dtable tbody tr:hover { background:var(--hover); }
.dtable tfoot td { padding:10px 12px; border-top:2px solid var(--accent); font-weight:700; background:var(--card2); }

/* Coverage matrix */
.cov-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.cov-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:16px; display:flex; align-items:center; gap:14px; }
.cov-icon { font-size:2rem; width:48px; text-align:center; flex-shrink:0; }
.cov-info { flex:1; }
.cov-info .cov-type { font-weight:600; font-size:0.9rem; margin-bottom:2px; }
.cov-info .cov-detail { font-size:0.82rem; color:var(--muted); }
.cov-info .cov-amount { font-family:'Courier New',monospace; color:var(--accent3); font-weight:600; }
.cov-badge { padding:4px 12px; border-radius:8px; font-size:0.75rem; font-weight:700; flex-shrink:0; }
.cov-badge.yes { background:#16a34a33; color:#4ade80; }
.cov-badge.no { background:#dc262633; color:#f87171; }

/* Consolidation */
.cons-group { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px; }
.cons-group .cg-title { font-weight:700; color:var(--accent2); margin-bottom:8px; font-size:0.95rem; }
.cons-group .cg-pol { display:flex; justify-content:space-between; padding:4px 0; font-size:0.85rem; }
.cons-group .cg-pol .cg-name { color:var(--text); }
.cons-group .cg-pol .cg-val { color:var(--accent3); font-family:'Courier New',monospace; font-weight:600; }
.cons-group .cg-total { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); font-weight:700; display:flex; justify-content:space-between; }

/* Retirement */
.retire-box { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:800px) { .retire-box { grid-template-columns:1fr; } }
.retire-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:20px; text-align:center; }
.retire-card .rc-label { color:var(--muted); font-size:0.85rem; margin-bottom:6px; }
.retire-card .rc-val { font-size:2rem; font-weight:700; font-family:'Courier New',monospace; }
.retire-bar { margin-top:16px; }
.retire-bar .rb-label { font-size:0.85rem; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; }
.retire-bar .rb-track { background:var(--bg); border-radius:8px; height:28px; overflow:hidden; border:1px solid var(--border); position:relative; }
.retire-bar .rb-fill { height:100%; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; color:white; min-width:40px; }

/* Charts */
.chart-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
.chart-box h4 { color:var(--accent); margin-bottom:10px; font-size:0.95rem; }
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:800px) { .charts-row { grid-template-columns:1fr; } .alerts-grid,.cov-grid { grid-template-columns:1fr; } }

.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:600; vertical-align:middle; }
.b-active { background:#16a34a33; color:#4ade80; }
.b-inactive { background:#dc262633; color:#f87171; }

.empty-msg { color:var(--dim); font-size:0.9rem; padding:20px; text-align:center; }

.footer { text-align:center; padding:20px; color:var(--dim); font-size:0.8rem; border-top:1px solid var(--border); margin-top:24px; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--dim); border-radius:3px; }
</style>
</head>

  feeAccum: { good: 0.25, warn: 0.5 },
  feeDeposit: { good: 0, warn: 2 },

// ─── Helpers ───
function n(v){ if(v===''||v===null||v===undefined||v==='לא נמצא')return 0; const x=parseFloat(String(v).replace(/,/g,'')); return isNaN(x)?0:x; }
function fc(v){ const x=typeof v==='number'?v:n(v); if(x===0)return '—'; return '₪'+x.toLocaleString('he-IL',{maximumFractionDigits:0}); }
function fp(v){ if(v===null||v===undefined||v==='')return '—'; return n(v).toFixed(2)+'%'; }
function f(v){ return (v===''||v===null||v===undefined)?null:String(v); }
function toArr(v){ if(!v)return[]; if(Array.isArray(v))return v; if(typeof v==='object')return[v]; return[]; }

function getAge(client){
  if(!client||!client['תאריך לידה']) return null;
  const parts = client['תאריך לידה'].split('-');
  if(parts.length!==3) return null;
  const birth = new Date(+parts[2], +parts[1]-1, +parts[0]);
  const age = Math.floor((new Date(2026,1,28) - birth) / (365.25*86400000));
  return age>0&&age<120 ? age : null;
}

// ─── Build persons ───
const persons = DATA.map((d,i) => {
  const pols = d.polisot||[];
  let name='', clientData=null;
  for(const p of pols){
    if(p['לקוח']&&typeof p['לקוח']==='object'){
      clientData = p['לקוח'];
      name = (clientData['שם פרטי']||'')+' '+(clientData['שם משפחה']||'');
      break;
    }
  }
  if(!name) for(const p of pols){ const g=p['נתוני גביה']||{}; if(g['שם משלם']){name=g['שם משלם'];break;} }
  return { id:d.person_id_number, name:name.trim()||d.person_id_number, polisot:pols, client:clientData };
});

// ─── Selector ───
const sel = document.getElementById('clientSelect');
persons.forEach((p,i) => { const o=document.createElement('option'); o.value=i; o.textContent=`${p.name} (${p.id}) — ${p.polisot.length} פוליסות`; sel.appendChild(o); });
let currentIdx = 0;
sel.addEventListener('change', () => { currentIdx=+sel.value; render(); });
document.getElementById('prevBtn').addEventListener('click', () => { currentIdx=(currentIdx-1+persons.length)%persons.length; sel.value=currentIdx; render(); });
document.getElementById('nextBtn').addEventListener('click', () => { currentIdx=(currentIdx+1)%persons.length; sel.value=currentIdx; render(); });

function analyzeFindings(P){
  const findings = [];
  const age = getAge(P.client);

  P.polisot.forEach(pol => {
    const sav = n(pol['סך חיסכון']);
    const feeA = n(pol['דמנה״ל צבירה']);
    const feeD = n(pol['דמנה״ל הפקדה']);
    const status = pol['סטטוס'];
    const name = pol['שם תוכנית']||'—';
    const type = pol['סוג מוצר']||'';

    // High accumulation fees
    if(sav > 0 && feeA > BENCH.feeAccum.warn){
      const saving = sav * (feeA - BENCH.feeAccum.good) / 100;
      findings.push({ severity:'critical', icon:'💸', title:'דמי ניהול צבירה גבוהים', detail:`${name}: דמ"נ צבירה ${feeA}% על חיסכון של ${fc(sav)}. ניתן לחסוך ${fc(saving)} בשנה בהורדה ל-${BENCH.feeAccum.good}%.`, policy:name, amount:saving });
    } else if(sav > 0 && feeA > BENCH.feeAccum.good){
      const saving = sav * (feeA - BENCH.feeAccum.good) / 100;
      findings.push({ severity:'warning', icon:'💳', title:'דמי ניהול צבירה — אפשר להוריד', detail:`${name}: דמ"נ צבירה ${feeA}% — מעל הממוצע התחרותי (${BENCH.feeAccum.good}%). חיסכון פוטנציאלי: ${fc(saving)}/שנה.`, policy:name, amount:saving });
    }

    // High deposit fees
    if(feeD > BENCH.feeDeposit.warn){
      findings.push({ severity:'critical', icon:'📤', title:'דמי ניהול הפקדה גבוהים', detail:`${name}: דמ"נ הפקדה ${feeD}% — גבוה מאוד. בשוק תחרותי ניתן לקבל 0%.`, policy:name });
    } else if(feeD > BENCH.feeDeposit.good && feeD > 0){
      findings.push({ severity:'warning', icon:'📤', title:'דמי ניהול הפקדה — ניתן לבטל', detail:`${name}: דמ"נ הפקדה ${feeD}%. בשוק תחרותי ניתן לקבל 0%.`, policy:name });
    }

    // Dormant policies with money
    if(status === 'לא פעיל' && sav > 0){
      findings.push({ severity:'critical', icon:'💤', title:'פוליסה רדומה עם כסף', detail:`${name}: סטטוס לא פעיל אבל יש ${fc(sav)} חיסכון. ניתן לנייד או לאחד.`, policy:name, amount:sav });
    }

    // Garnishment
    if(pol['עיקול'] === 'כן'){
      findings.push({ severity:'critical', icon:'⚠️', title:'עיקול על פוליסה', detail:`${name}: קיים עיקול — יש לבדוק מול הלקוח.`, policy:name });
    }

    // Lien
    if(pol['שיעבוד'] === 'כן'){
      findings.push({ severity:'warning', icon:'🔒', title:'שיעבוד על פוליסה', detail:`${name}: קיים שיעבוד — לא ניתן לנייד ללא שחרור.`, policy:name });
    }

    // Wrong investment track for age
    if(age !== null){
      const tracks = toArr(pol['פירוט מסלולי השקעה']);
      tracks.forEach(t => {
        const trackName = (t['שם מסלול']||'').toLowerCase();
        if(age < 50 && (trackName.includes('שמרני') || trackName.includes('אג"ח') || trackName.includes('סולידי'))){
          findings.push({ severity:'warning', icon:'📉', title:'מסלול שמרני ללקוח צעיר', detail:`${name}: הלקוח בן ${age} במסלול "${t['שם מסלול']}" — מסלול שמרני מדי לגיל.`, policy:name });
        }
        if(age > 55 && (trackName.includes('מניות') || trackName.includes('אגרסיבי') || trackName.includes('מנייתי'))){
          findings.push({ severity:'warning', icon:'📈', title:'מסלול אגרסיבי ללקוח מבוגר', detail:`${name}: הלקוח בן ${age} במסלול "${t['שם מסלול']}" — סיכון גבוה לגיל.`, policy:name });
        }
      });
    }

    // Missing deposits for active salaried
    if(status === 'פעיל' && pol['סוג חשבון'] === 'שכיר'){
      const lastDep = n(pol['הפקדה אחרונה סה״כ']);
      if(lastDep === 0 && sav > 0){
        findings.push({ severity:'warning', icon:'🚫', title:'אין הפקדות שוטפות', detail:`${name}: פוליסה פעילה ללא הפקדות — ייתכן שהמעסיק הפסיק להפריש.`, policy:name });
      }
      // Check contribution %
      const salary = n(pol['שכר מדווח להפקדה עפ"י נתוני יצרן']);
      if(salary > 0 && lastDep > 0){
        const pct = (lastDep / salary) * 100;
        if(pct < 15){
          findings.push({ severity:'warning', icon:'📊', title:'הפרשה חלקית', detail:`${name}: הפקדה ${fp(pct)} משכר ${fc(salary)} — מתחת ל-18.5% הנדרשים.`, policy:name });
        }
      }
    }
  });

  // Duplicate product types
  const typeMap = {};
  P.polisot.forEach(pol => {
    const t = pol['סוג מוצר'];
    if(t) { if(!typeMap[t]) typeMap[t]=[]; typeMap[t].push(pol['שם תוכנית']||'—'); }
  });
  Object.keys(typeMap).forEach(t => {
    if(typeMap[t].length >= 2){
      findings.push({ severity:'warning', icon:'🔄', title:`פוליסות כפולות — ${t}`, detail:`נמצאו ${typeMap[t].length} פוליסות מסוג "${t}": ${typeMap[t].join(', ')}. ניתן לשקול איחוד.` });
    }
  });

  // Coverage analysis
  const hasCov = analyzeCoverageTypes(P);
  if(!hasCov.life){
    findings.push({ severity:'critical', icon:'💀', title:'אין כיסוי חיים / ריסק מוות', detail:'הלקוח ללא ביטוח חיים — במקרה פטירה המשפחה לא מכוסה.' });
  }
  if(!hasCov.disability){
    findings.push({ severity:'critical', icon:'🦽', title:'אין כיסוי אובדן כושר עבודה', detail:'הלקוח ללא ביטוח אכ"ע — במקרה נכות אין הכנסה חלופית.' });
  }

  // Sort: critical first, then warning
  findings.sort((a,b) => (a.severity==='critical'?0:1) - (b.severity==='critical'?0:1));

  return findings;
}

function analyzeCoverageTypes(P){
  const result = { life:false, disability:false, survivors:false, disabilityPension:false, mortgage:false, nursing:false, details:[] };
  const coverKeywords = {
    life: ['מוות','חיים','ריסק','life'],
    disability: ['אובדן כושר','אכ"ע','אכע','כושר עבודה','disability'],
    survivors: ['שאירים','שארים','survivor'],
    disabilityPension: ['נכות','invalidity'],
    mortgage: ['משכנתא','mortgage'],
    nursing: ['סיעוד','nursing']
  };

  P.polisot.forEach(pol => {
    const covers = toArr(pol['כיסויים']);
    covers.forEach(cov => {
      const covName = (cov['שם כיסוי אצל היצרן']||'').toLowerCase();
      const covType = (cov['סוג כיסוי אצל יצרן']||'').toLowerCase();
      const details = cov['פרטי כיסוי']||{};
      const covTypeDetail = (details['סוג הכיסוי הביטוחי']||'').toLowerCase();
      const pension = cov['כיסוי בקרן פנסיה']||{};
      const basicIns = cov['ביטוח יסודי']||{};
      const allText = covName + ' ' + covType + ' ' + covTypeDetail;

      Object.keys(coverKeywords).forEach(cat => {
        if(coverKeywords[cat].some(kw => allText.includes(kw))){
          result[cat] = true;
          result.details.push({
            type: cat,
            name: cov['שם כיסוי אצל היצרן']||'—',
            amount: n(basicIns['סכום ביטוח'])||n(basicIns['סכום ביטוח למקרה מוות'])||0,
            policy: pol['שם תוכנית']||'—',
            status: basicIns['סטטוס']||'—'
          });
        }
      });

      // Pension fund covers
      if(n(pension['עלות כיסוי נכות'])>0 || f(pension['פנסיית נכות'])){
        result.disabilityPension = true;
        result.details.push({ type:'disabilityPension', name:'כיסוי נכות בקרן פנסיה', amount:n(pension['פנסיית נכות'])||0, policy:pol['שם תוכנית']||'—', status:'כן' });
      }
      if(n(pension['עלות כיסוי שאירים'])>0 || n(pension['קצבת שאירים - אלמן/ה'])>0){
        result.survivors = true;
        result.details.push({ type:'survivors', name:'כיסוי שארים בקרן פנסיה', amount:n(pension['קצבת שאירים - אלמן/ה'])||0, policy:pol['שם תוכנית']||'—', status:'כן' });
      }
    });

    // Check product type too
    const prodType = (pol['סוג מוצר']||'').toLowerCase();
    const prodName = (pol['שם תוכנית']||'').toLowerCase();
    if(prodType.includes('משכנתא') || prodName.includes('משכנתא')){ result.mortgage = true; }
    if((prodType.includes('סיכון') || prodName.includes('נכות')) && !result.disability){
      // Could be disability risk product
    }
  });

  return result;
}

function analyzeFees(P){
  const rows = [];
  P.polisot.forEach(pol => {
    const sav = n(pol['סך חיסכון']);
    if(sav <= 0) return;
    const feeA = n(pol['דמנה״ל צבירה']);
    const feeD = n(pol['דמנה״ל הפקדה']);
    const annualCost = sav * feeA / 100;
    const benchCost = sav * BENCH.feeAccum.good / 100;
    const annualSaving = annualCost - benchCost;
    // 10 year projection with 4% return
    let saving10 = 0;
    let bal = sav;
    for(let y=0;y<10;y++){
      saving10 += bal * (feeA - BENCH.feeAccum.good) / 100;
      bal *= (1 + BENCH.assumedReturn);
    }
    rows.push({
      name: pol['שם תוכנית']||'—',
      savings: sav,
      feeAccum: feeA,
      feeDeposit: feeD,
      annualCost,
      benchCost,
      annualSaving: Math.max(0, annualSaving),
      saving10: Math.max(0, saving10),
      status: pol['סטטוס']
    });
  });
  return rows;
}

function analyzeConsolidation(P){
  const groups = {};
  P.polisot.forEach(pol => {
    const t = pol['סוג מוצר']||'אחר';
    if(!groups[t]) groups[t] = [];
    groups[t].push({
      name: pol['שם תוכנית']||'—',
      savings: n(pol['סך חיסכון']),
      status: pol['סטטוס'],
      feeAccum: n(pol['דמנה״ל צבירה']),
      producer: typeof pol['יצרן']==='object'?(pol['יצרן']['שם יצרן']||'—'):(pol['יצרן']||'—')
    });
  });

  const result = [];
  // Groups with 2+ policies
  Object.keys(groups).forEach(type => {
    if(groups[type].length >= 2){
      result.push({ type, policies:groups[type], reason:'כפולות', totalSavings:groups[type].reduce((s,p)=>s+p.savings,0) });
    }
  });
  // Dormant with money (single)
  P.polisot.forEach(pol => {
    if(pol['סטטוס']==='לא פעיל' && n(pol['סך חיסכון'])>0){
      const t = pol['סוג מוצר']||'אחר';
      if(!result.find(r=>r.type===t && r.reason==='כפולות')){
        result.push({ type:t, policies:[{name:pol['שם תוכנית']||'—',savings:n(pol['סך חיסכון']),status:'לא פעיל',feeAccum:n(pol['דמנה״ל צבירה']),producer:typeof pol['יצרן']==='object'?(pol['יצרן']['שם יצרן']||'—'):(pol['יצרן']||'—')}], reason:'רדומה', totalSavings:n(pol['סך חיסכון']) });
      }
    }
  });
  return result;
}

function analyzeRetirement(P){
  const age = getAge(P.client);
  let salary = 0, expectedPension = 0, retireAge = 67;
  let totalFuture = 0;

  P.polisot.forEach(pol => {
    const s = n(pol['שכר מדווח להפקדה עפ"י נתוני יצרן']);
    if(s > salary) salary = s;
    const ra = parseFloat(pol['גיל פרישה']);
    if(ra > 0) retireAge = ra;
    totalFuture += n(pol['סה״כ יתרה עתידית']);

    // Check retirement balance data
    const retData = pol['יתרות לגיל פרישה'];
    if(retData && typeof retData === 'object' && !Array.isArray(retData)){
      const pension = n(retData['קצבת זקנה/גמלא חודשית צפויה  (ללא פרמיות)']) || n(retData['סכום קצבת זקנה']);
      expectedPension += pension;
    } else if(Array.isArray(retData)){
      retData.forEach(r => {
        const pension = n(r['קצבת זקנה/גמלא חודשית צפויה  (ללא פרמיות)']) || n(r['סכום קצבת זקנה']);
        expectedPension += pension;
      });
    }
  });

  const target = salary * BENCH.retirementTarget;
  const gap = target - expectedPension;

  return { age, salary, expectedPension, retireAge, target, gap, totalFuture };
}

function analyzeDeposits(P){
  const rows = [];
  P.polisot.forEach(pol => {
    if(pol['סטטוס'] !== 'פעיל' || pol['סוג חשבון'] !== 'שכיר') return;
    const salary = n(pol['שכר מדווח להפקדה עפ"י נתוני יצרן']);
    const empDep = n(pol['הפקדה חודשית אחרונה - חוסך']);
    const erDep = n(pol['הפקדה חודשית אחרונה - מעסיק']);
    const totalDep = n(pol['הפקדה אחרונה סה״כ']);

    if(salary <= 0 && totalDep <= 0) return;

    const actualPct = salary > 0 ? (totalDep / salary * 100) : 0;
    const requiredTotal = 18.5;
    const gap = salary > 0 ? (requiredTotal - actualPct) : 0;

    rows.push({
      name: pol['שם תוכנית']||'—',
      salary,
      empDeposit: empDep,
      erDeposit: erDep,
      totalDeposit: totalDep,
      actualPct,
      requiredPct: requiredTotal,
      gap: Math.max(0, gap),
      missingAmount: salary > 0 ? Math.max(0, salary * gap / 100) : 0
    });
  });
  return rows;
}

        <div class="cov-type">${ct.label}</div>
        <div class="cov-detail">
          ${exists ? (amount>0?'סכום: <span class="cov-amount">'+fc(amount)+'</span>':'קיים') : (ct.critical?'<span style="color:var(--danger);font-weight:700">חסר — הלקוח חשוף!</span>':'לא נמצא')}
        </div>
        ${policies?'<div class="cov-detail">'+policies+'</div>':''}
      </div>
      <span class="cov-badge ${exists?'yes':'no'}">${exists?'✅ מכוסה':'❌ חסר'}</span>
    </div>`;
  });
  h += `</div></div></div>`;

  // ── Section 4: Consolidation ──
  h += `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>🏦 ניתוח איחוד פוליסות</h3>
    <div style="display:flex;gap:8px;align-items:center">
      ${consolidation.length?'<span class="cnt">'+consolidation.length+' הזדמנויות</span>':''}
      <span class="toggle">▼</span>
    </div>
  </div><div class="section-body">`;

  if(consolidation.length){
    consolidation.forEach(g => {
      h += `<div class="cons-group">
        <div class="cg-title">${g.reason==='כפולות'?'🔄':'💤'} ${g.type} — ${g.reason==='כפולות'?'ניתן לאחד '+g.policies.length+' פוליסות':'פוליסה רדומה — ניתן לנייד'}</div>`;
      g.policies.forEach(p => {
        h += `<div class="cg-pol">
          <span class="cg-name">${p.name} <span style="color:var(--muted);font-size:0.8rem">(${p.producer})</span> ${p.status==='לא פעיל'?'<span class="badge b-inactive">לא פעיל</span>':''}</span>
          <span class="cg-val">${fc(p.savings)} <span style="color:var(--warning);font-size:0.8rem">${p.feeAccum.toFixed(2)}%</span></span>
        </div>`;
      });
      h += `<div class="cg-total"><span>סה"כ חיסכון בקבוצה</span><span style="color:var(--accent3)">${fc(g.totalSavings)}</span></div></div>`;
    });
  } else {
    h += `<div class="empty-msg">אין הזדמנויות איחוד — כל סוגי המוצר ייחודיים</div>`;
  }
  h += `</div></div>`;

  // ── Section 5: Retirement ──
  h += `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>📈 תחזית פרישה</h3>
    <span class="toggle">▼</span>
  </div><div class="section-body">`;

  if(retirement.salary > 0 || retirement.expectedPension > 0){
    const pct = retirement.target > 0 ? Math.min(100, (retirement.expectedPension / retirement.target) * 100) : 0;
    const barColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';

    h += `<div class="retire-box">
      <div class="retire-card"><div class="rc-label">שכר מדווח</div><div class="rc-val" style="color:var(--accent)">${fc(retirement.salary)}</div></div>
      <div class="retire-card"><div class="rc-label">גיל נוכחי</div><div class="rc-val" style="color:var(--accent2)">${retirement.age||'—'}</div></div>
      <div class="retire-card"><div class="rc-label">קצבה צפויה (מהנתונים)</div><div class="rc-val" style="color:var(--accent3)">${fc(retirement.expectedPension)}</div></div>
      <div class="retire-card"><div class="rc-label">יעד (70% משכר)</div><div class="rc-val" style="color:var(--accent4)">${fc(retirement.target)}</div></div>
    </div>`;

    h += `<div class="retire-bar" style="margin-top:20px">
      <div class="rb-label"><span>קצבה צפויה מול יעד</span><span>${pct.toFixed(0)}%</span></div>
      <div class="rb-track"><div class="rb-fill" style="width:${pct}%;background:${barColor}">${fc(retirement.expectedPension)}</div></div>
    </div>`;

    if(retirement.gap > 0){
      h += `<div style="margin-top:16px;padding:16px;background:#7f1d1d33;border-radius:10px;border-right:4px solid var(--danger)">
        <strong style="color:var(--danger)">חסרים ${fc(retirement.gap)} לחודש</strong>
        <span style="color:var(--muted);font-size:0.85rem"> — כדי להגיע ל-70% מהשכר (${fc(retirement.target)}), הלקוח צריך להגדיל חיסכון פנסיוני.</span>
      </div>`;
    } else if(retirement.expectedPension > 0){
      h += `<div style="margin-top:16px;padding:16px;background:#14532d33;border-radius:10px;border-right:4px solid var(--success)">
        <strong style="color:var(--success)">הלקוח בכיוון טוב!</strong>
        <span style="color:var(--muted);font-size:0.85rem"> — הקצבה הצפויה עומדת ביעד של 70% מהשכר.</span>
      </div>`;
    }

    // Total future balance
    h += `<div style="margin-top:16px;text-align:center;color:var(--muted);font-size:0.9rem">
      סה"כ יתרה עתידית (כל הפוליסות): <strong style="color:var(--accent3);font-family:'Courier New',monospace">${fc(retirement.totalFuture)}</strong>
      · גיל פרישה: <strong>${retirement.retireAge}</strong>
    </div>`;
  } else {
    h += `<div class="empty-msg">אין נתוני שכר או קצבה צפויה — לא ניתן לחשב תחזית</div>`;
  }
  h += `</div></div>`;

  // ── Section 6: Deposits ──
  h += `<div class="section"><div class="section-head" onclick="toggleSection(this)">
    <h3>📊 ניתוח הפקדות</h3>
    <div style="display:flex;gap:8px;align-items:center">
      ${deposits.length?'<span class="cnt">'+deposits.length+' פוליסות פעילות</span>':''}
      <span class="toggle">▼</span>
    </div>
  </div><div class="section-body">`;

  if(deposits.length){
    h += `<div style="overflow-x:auto"><table class="dtable"><thead><tr>
      <th>שם תוכנית</th><th>שכר מדווח</th><th>הפקדת עובד</th><th>הפקדת מעסיק</th>
      <th>סה"כ הפקדה</th><th>% בפועל</th><th>% נדרש</th><th>פער</th><th>חוסר ₪</th>
    </tr></thead><tbody>`;
    deposits.forEach(d => {
      const isGap = d.gap > 0;
      h += `<tr>
        <td>${d.name}</td>
        <td class="amount">${fc(d.salary)}</td>
        <td class="amount">${fc(d.empDeposit)}</td>
        <td class="amount">${fc(d.erDeposit)}</td>
        <td class="amount">${fc(d.totalDeposit)}</td>
        <td style="color:${isGap?'var(--danger)':'var(--success)'};font-weight:700">${d.actualPct.toFixed(1)}%</td>
        <td>${d.requiredPct}%</td>
        <td style="color:${isGap?'var(--danger)':'var(--success)'};font-weight:700">${isGap?d.gap.toFixed(1)+'%':'✓'}</td>
        <td class="amount" style="color:${isGap?'var(--danger)':'var(--muted)'}">${isGap?fc(d.missingAmount):'—'}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;

    // Deposits chart
    h += `<div class="charts-row" style="margin-top:16px">
      <div class="chart-box"><h4>הרכב הפקדות לפי פוליסה</h4><canvas id="chDeposits"></canvas></div>
      <div class="chart-box"><h4>% הפקדה בפועל vs נדרש</h4><canvas id="chDepPct"></canvas></div>
    </div>`;
  } else {
    h += `<div class="empty-msg">אין פוליסות שכיר פעילות עם נתוני הפקדה</div>`;
  }
  h += `</div></div>`;

  main.innerHTML = h;
  buildAnalysisCharts(fees, deposits);
}

// ─── Charts ───
function buildAnalysisCharts(fees, deposits){
  // Fee chart
  const feesWithSav = fees.filter(r=>r.annualSaving>0);
  if(feesWithSav.length && document.getElementById('chFees')){
    charts.push(new Chart(document.getElementById('chFees'),{
      type:'bar', data:{
        labels:feesWithSav.map(r=>r.name.substring(0,20)),
        datasets:[
          {label:'עלות נוכחית',data:feesWithSav.map(r=>r.annualCost),backgroundColor:'#ef4444'},
          {label:'עלות benchmark',data:feesWithSav.map(r=>r.benchCost),backgroundColor:'#22c55e'}
        ]
      }, options:{responsive:true,
        scales:{x:{ticks:{color:'#94a3b8'},grid:{display:false}},y:{ticks:{color:'#94a3b8',callback:v=>'₪'+v.toLocaleString()},grid:{color:'#1e293b'}}},
        plugins:{legend:{labels:{color:'#e2e8f0'}}}}
    }));
  }

  if(fees.length && document.getElementById('chFeesPct')){
    charts.push(new Chart(document.getElementById('chFeesPct'),{
      type:'bar', data:{
        labels:fees.map(r=>r.name.substring(0,20)),
        datasets:[{
          label:'דמ"נ צבירה %',
          data:fees.map(r=>r.feeAccum),
          backgroundColor:fees.map(r=>r.feeAccum>0.5?'#ef4444':r.feeAccum>0.25?'#eab308':'#22c55e')
        }]
      }, options:{responsive:true, indexAxis:'y',
        scales:{x:{ticks:{color:'#94a3b8',callback:v=>v+'%'},grid:{color:'#1e293b'},min:0},y:{ticks:{color:'#e2e8f0',font:{size:11}},grid:{display:false}}},
        plugins:{legend:{display:false},
          annotation:{annotations:{benchLine:{type:'line',xMin:0.25,xMax:0.25,borderColor:'#22c55e',borderWidth:2,borderDash:[5,5]}}}
        }}
    }));
  }

  // Deposits chart
  if(deposits.length && document.getElementById('chDeposits')){
    charts.push(new Chart(document.getElementById('chDeposits'),{
      type:'bar', data:{
        labels:deposits.map(d=>d.name.substring(0,20)),
        datasets:[
          {label:'עובד',data:deposits.map(d=>d.empDeposit),backgroundColor:'#38bdf8'},
          {label:'מעסיק',data:deposits.map(d=>d.erDeposit),backgroundColor:'#a78bfa'}
        ]
      }, options:{responsive:true, stacked:true,
        scales:{x:{stacked:true,ticks:{color:'#94a3b8'},grid:{display:false}},y:{stacked:true,ticks:{color:'#94a3b8',callback:v=>'₪'+v},grid:{color:'#1e293b'}}},
        plugins:{legend:{labels:{color:'#e2e8f0'}}}}
    }));
  }

  if(deposits.length && document.getElementById('chDepPct')){
    charts.push(new Chart(document.getElementById('chDepPct'),{
      type:'bar', data:{
        labels:deposits.map(d=>d.name.substring(0,20)),
        datasets:[
          {label:'% בפועל',data:deposits.map(d=>d.actualPct),backgroundColor:deposits.map(d=>d.gap>0?'#ef4444':'#22c55e')},
          {label:'% נדרש',data:deposits.map(d=>d.requiredPct),type:'line',borderColor:'#eab308',borderWidth:2,pointRadius:0,fill:false}
        ]
      }, options:{responsive:true,
        scales:{x:{ticks:{color:'#94a3b8'},grid:{display:false}},y:{ticks:{color:'#94a3b8',callback:v=>v+'%'},grid:{color:'#1e293b'},max:25}},
        plugins:{legend:{labels:{color:'#e2e8f0'}}}}
    }));
  }
}

function toggleSection(el){ el.nextElementSibling.classList.toggle('open'); el.querySelector('.toggle').classList.toggle('open'); }

render();
</script>
</body>
</html>
