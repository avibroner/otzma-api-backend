<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">

    <title>CRM Project</title>
    <style>

    </style>
</head>

<body>
    <div id="app-root">
        <!-- כל ה-UI שלך כאן -->

        <div class="header">
            <div class="client-title">
                <h1 id="primary_insured_title_name">תיק לקוח: ישראל ישראלי</h1>
            </div>
            <button class="btn-save" onclick="simulateSave(this)">שגר למערכת 🚀</button>
        </div>

        <div class="section-container family-section">
            <div class="section-header family-header">תא משפחתי</div>

            <table id="familyTable">
                <thead>
                    <tr>
                        <th style="width: 22%">שם מלא</th>
                        <th style="width: 18%">קשר משפחתי</th>
                        <th style="width: 18%">תאריך לידה</th>
                        <th style="width: 20%">תעודת זהות</th>
                        <th style="width: 10%"></th>
                    </tr>
                </thead>

                <tbody id="familyMembersBody"></tbody>

                <tfoot>
                    <tr style="background: #f1f5f9;">
                        <td>
                            <input type="text" id="newMemName" placeholder="שם מלא">
                        </td>

                        <td>
                            <select id="newMemRel">
                                <option value disabled selected hidden>בחר קרבה</option>
                                <option value="ילד/ה">ילד/ה</option>
                                <option value="בן/בת זוג">בן/בת זוג</option>
                                <option value="אחר">אחר</option>
                            </select>
                        </td>

                        <td>
                            <input type="text" id="newMemBirthDate" placeholder="DD-MM-YYYY" inputmode="numeric">
                        </td>

                        <td>
                            <input type="text" id="newMemID" placeholder="ת.ז">
                        </td>

                        <td style="text-align:center;">
                            <button class="btn-text" onclick="addFamilyMember()">+ הוסף</button>
                        </td>
                    </tr>
                </tfoot>
            </table>

        </div>
        <!-- פיננסים/ביטוח -->
        <div class="action-bar">
            <span style="font-weight:700; color:#334155;">הוספת הצעה
                חדשה:</span>
            <select id="categorySelector" class="product-select">
                <option value disabled selected>בחר קטגוריה</option>
            </select>
            <select id="productSelector" class="product-select" disabled>
                <option value="" disabled selected hidden>בחר מוצר</option>
            </select>

            <button class="btn-add" onclick="addNewOffer()">+ צור כרטיס
                הצעה</button>
        </div>
        <div id="offersContainer"></div>
    </div>

    <script src="/app.js"></script>



</body>

</html>
